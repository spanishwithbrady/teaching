<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Map · Spanish with Brady</title>
  <style>
    :root {
      --bg:#f7f5ef; --green:#6b8c42; --brown:#2e2416;
      --card:#ffffff; --border:#e2ddd4; --muted:#7a6e60;
      --warm:#8B5E3C; --radius:12px; --gtint:#eef4e4;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:system-ui,-apple-system,sans-serif;
      background:var(--bg); color:var(--brown);
      display:flex; flex-direction:column; min-height:100vh; }
    a { color:inherit; text-decoration:none; }
    .lang-zh { display:none; }
    body.zh .lang-en { display:none; }
    body.zh .lang-zh { display:inline; }
    .t-hdr { display:flex; align-items:center; justify-content:space-between;
      padding:10px 18px; border-bottom:1px solid var(--border);
      background:var(--card); }
    .t-logo { font-size:.9rem; font-weight:700; color:var(--brown); }
    .t-tog { display:flex; border:1px solid var(--border);
      border-radius:6px; overflow:hidden; }
    .t-tog button { padding:5px 13px; font-size:12px; font-weight:500;
      border:none; cursor:pointer; background:var(--bg); color:var(--muted); }
    .t-tog button.act { background:var(--green); color:#fff; }
    main { flex:1; padding:20px 18px;
      max-width:480px; margin:0 auto; width:100%; }
    .card { background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px 18px; }
    .card-title { font-size:1rem; font-weight:700; color:var(--warm);
      margin-bottom:4px; }
    .card-sub { font-size:.85rem; color:var(--muted);
      margin-bottom:16px; line-height:1.5; }
    .body-container { position:relative; display:inline-block;
      max-width:280px; width:100%; }
    .body-container img { width:100%; display:block; }
    .note { background:#f5ede0; border-left:3px solid var(--warm);
      border-radius:0 8px 8px 0; padding:10px 14px; margin-top:14px;
      font-size:.82rem; line-height:1.6; }
  </style>
</head>
<body>
  <header class="t-hdr">
    <a class="t-logo" href="../">Spanish with Brady</a>
    <div class="t-tog">
      <button id="en-btn" class="act" onclick="setLang('en')">EN</button>
      <button id="zh-btn" onclick="setLang('zh')">中文</button>
    </div>
  </header>
  <main>
    <div class="card">
      <div class="card-title">
        <span class="lang-en">🫀 Body Map</span>
        <span class="lang-zh">🫀 身体部位图</span>
      </div>
      <p class="card-sub">
        <span class="lang-en">Click a body part — then say what hurts using DOLER.</span>
        <span class="lang-zh">点击一个身体部位——然后用 DOLER 说哪里疼。</span>
      </p>

      <div style="display:flex; justify-content:center; margin-bottom:16px;">
        <div class="body-container">
          <img src="../assets/Human_body_outline.png" alt="Human body outline">
  <div id="bm-cabeza" class="bm-hotspot" data-part="cabeza" style="position:absolute;top:2%;left:35%;width:30%;height:12%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('cabeza')"></div>
  <div id="bm-cuello" class="bm-hotspot" data-part="cuello" style="position:absolute;top:13%;left:40%;width:20%;height:5%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('cuello')"></div>
  <div id="bm-hombro-izquierdo" class="bm-hotspot" data-part="hombro izquierdo" style="position:absolute;top:17%;left:15%;width:18%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('hombro izquierdo')"></div>
  <div id="bm-hombro-derecho" class="bm-hotspot" data-part="hombro derecho" style="position:absolute;top:17%;left:67%;width:18%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('hombro derecho')"></div>
  <div id="bm-brazo-izquierdo" class="bm-hotspot" data-part="brazo izquierdo" style="position:absolute;top:25%;left:10%;width:14%;height:18%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('brazo izquierdo')"></div>
  <div id="bm-brazo-derecho" class="bm-hotspot" data-part="brazo derecho" style="position:absolute;top:25%;left:76%;width:14%;height:18%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('brazo derecho')"></div>
  <div id="bm-mano-izquierda" class="bm-hotspot" data-part="mano izquierda" style="position:absolute;top:42%;left:8%;width:13%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('mano izquierda')"></div>
  <div id="bm-mano-derecha" class="bm-hotspot" data-part="mano derecha" style="position:absolute;top:42%;left:79%;width:13%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('mano derecha')"></div>
  <div id="bm-pecho" class="bm-hotspot" data-part="pecho" style="position:absolute;top:18%;left:33%;width:34%;height:10%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('pecho')"></div>
  <div id="bm-estómago" class="bm-hotspot" data-part="estómago" style="position:absolute;top:28%;left:33%;width:34%;height:10%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('estómago')"></div>
  <div id="bm-cadera" class="bm-hotspot" data-part="cadera" style="position:absolute;top:38%;left:30%;width:40%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('cadera')"></div>
  <div id="bm-pierna-izquierda" class="bm-hotspot" data-part="pierna izquierda" style="position:absolute;top:46%;left:25%;width:18%;height:25%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('pierna izquierda')"></div>
  <div id="bm-pierna-derecha" class="bm-hotspot" data-part="pierna derecha" style="position:absolute;top:46%;left:57%;width:18%;height:25%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('pierna derecha')"></div>
  <div id="bm-rodilla-izquierda" class="bm-hotspot" data-part="rodilla izquierda" style="position:absolute;top:62%;left:25%;width:18%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('rodilla izquierda')"></div>
  <div id="bm-rodilla-derecha" class="bm-hotspot" data-part="rodilla derecha" style="position:absolute;top:62%;left:57%;width:18%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('rodilla derecha')"></div>
  <div id="bm-pie-izquierdo" class="bm-hotspot" data-part="pie izquierdo" style="position:absolute;top:85%;left:23%;width:20%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('pie izquierdo')"></div>
  <div id="bm-pie-derecho" class="bm-hotspot" data-part="pie derecho" style="position:absolute;top:85%;left:57%;width:20%;height:8%;border-radius:50%;cursor:pointer;background:transparent;transition:background 0.2s,border 0.2s;" onclick="bmSelectPart('pie derecho')"></div>
        </div>
      </div>

      <div id="bm-result" style="text-align:center; margin-top:16px; min-height:60px;">
        <div id="bm-part-name" style="font-size:22px; font-weight:500;
          color:#2e2416; transition:opacity 0.3s;"></div>
        <div id="bm-sentence" style="font-size:15px; color:#6b8c42;
          margin-top:4px; opacity:0;"></div>
      </div>

      <div style="display:flex; gap:8px; justify-content:center;
        margin-top:12px; flex-wrap:wrap;">
        <button onclick="bmRandomPart()"
          style="padding:8px 16px; background:#6b8c42; color:white;
          border:none; border-radius:6px; cursor:pointer; font-size:13px;">
          Aleatorio / Random
        </button>
        <button onclick="bmShowSentence()"
          style="padding:8px 16px; background:#f7f5ef; color:#8B5E3C;
          border:1px solid #e2ddd4; border-radius:6px;
          cursor:pointer; font-size:13px;">
          Mostrar frase / Show sentence
        </button>
        <button onclick="bmClearAll()"
          style="padding:8px 16px; background:#f7f5ef; color:#7a6e60;
          border:1px solid #e2ddd4; border-radius:6px;
          cursor:pointer; font-size:13px;">
          Limpiar / Clear
        </button>
      </div>
    </div>

    <div class="note">
      <span class="lang-en"><strong>DOLER</strong> works like GUSTAR —<br>
        Me <strong>duele</strong> la cabeza (singular) ·
        Me <strong>duelen</strong> los pies (plural)</span>
      <span class="lang-zh"><strong>DOLER</strong> 用法同 GUSTAR —<br>
        Me <strong>duele</strong> la cabeza（单数）·
        Me <strong>duelen</strong> los pies（复数）</span>
    </div>
  </main>
  <script>
    function setLang(l) {
      document.body.classList.toggle('zh', l === 'zh');
      document.getElementById('en-btn').classList.toggle('act', l === 'en');
      document.getElementById('zh-btn').classList.toggle('act', l === 'zh');
    }

    const bmParts = {
  "cabeza":            { es: "la cabeza",    sentence: "Me duele la cabeza." },
  "cuello":            { es: "el cuello",    sentence: "Me duele el cuello." },
  "hombro izquierdo":  { es: "el hombro",   sentence: "Me duele el hombro." },
  "hombro derecho":    { es: "el hombro",   sentence: "Me duele el hombro." },
  "brazo izquierdo":   { es: "el brazo",    sentence: "Me duele el brazo." },
  "brazo derecho":     { es: "el brazo",    sentence: "Me duele el brazo." },
  "mano izquierda":    { es: "la mano",     sentence: "Me duele la mano." },
  "mano derecha":      { es: "la mano",     sentence: "Me duele la mano." },
  "pecho":             { es: "el pecho",    sentence: "Me duele el pecho." },
  "estómago":          { es: "el estómago", sentence: "Me duele el estómago." },
  "cadera":            { es: "la cadera",   sentence: "Me duele la cadera." },
  "pierna izquierda":  { es: "la pierna",   sentence: "Me duelen las piernas." },
  "pierna derecha":    { es: "la pierna",   sentence: "Me duelen las piernas." },
  "rodilla izquierda": { es: "la rodilla",  sentence: "Me duelen las rodillas." },
  "rodilla derecha":   { es: "la rodilla",  sentence: "Me duelen las rodillas." },
  "pie izquierdo":     { es: "el pie",      sentence: "Me duelen los pies." },
  "pie derecho":       { es: "el pie",      sentence: "Me duelen los pies." }
};
    let bmCurrent = null;
    let bmSentenceVisible = false;

    function bmSelectPart(key) {
      bmCurrent = key;
      bmSentenceVisible = false;
      document.querySelectorAll('.bm-hotspot').forEach(el => {
        if (el.dataset.part === key) {
          el.style.background = 'rgba(90,122,50,0.35)';
          el.style.border = '2px solid #6b8c42';
          el.style.borderRadius = '50%';
        } else {
          el.style.background = 'transparent';
          el.style.border = 'none';
        }
      });
      const data = bmParts[key];
      document.getElementById('bm-part-name').textContent = data ? data.es : '';
      document.getElementById('bm-sentence').textContent = '';
      document.getElementById('bm-sentence').style.opacity = '0';
    }

    function bmRandomPart() {
      const keys = Object.keys(bmParts);
      const key = keys[Math.floor(Math.random() * keys.length)];
      bmSelectPart(key);
    }

    function bmShowSentence() {
      if (!bmCurrent) return;
      const data = bmParts[bmCurrent];
      if (data) {
        const el = document.getElementById('bm-sentence');
        el.textContent = data.sentence;
        el.style.transition = 'opacity 0.4s';
        el.style.opacity = '1';
        bmSentenceVisible = true;
      }
    }

    function bmClearAll() {
      bmCurrent = null;
      bmSentenceVisible = false;
      document.querySelectorAll('.bm-hotspot').forEach(el => {
        el.style.background = 'transparent';
        el.style.border = 'none';
      });
      document.getElementById('bm-part-name').textContent = '';
      const sentEl = document.getElementById('bm-sentence');
      sentEl.textContent = '';
      sentEl.style.opacity = '0';
    }

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Question Dice · Spanish with Brady</title>
  <style>

    :root{--bg:#f7f5ef;--green:#6b8c42;--brown:#2e2416;--card:#ffffff;
      --border:#e2ddd4;--muted:#7a6e60;--warm:#8B5E3C;--radius:12px;
      --gtint:#eef4e4;--wtint:#f5ede0;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,sans-serif;
      background:var(--bg);color:var(--brown);
      display:flex;flex-direction:column;min-height:100vh;}
    a{text-decoration:none;color:inherit;}
    .lang-zh{display:none;}
    body.zh .lang-en{display:none;}
    body.zh .lang-zh{display:inline;}
    .lang-zh-block{display:none;}
    body.zh .lang-zh-block{display:block;}
    body.zh .lang-en-block{display:none;}
    .t-hdr{display:flex;align-items:center;justify-content:space-between;
      padding:10px 18px;border-bottom:1px solid var(--border);
      background:var(--card);gap:12px;}
    .t-logo{font-size:.9rem;font-weight:700;color:var(--brown);}
    .t-back{font-size:.8rem;color:var(--warm);}
    .t-back:hover{text-decoration:underline;}
    .t-tog{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0;}
    .t-tog button{padding:5px 13px;font-size:12px;font-weight:500;border:none;
      cursor:pointer;background:var(--bg);color:var(--muted);}
    .t-tog button.act{background:var(--green);color:#fff;}
    main{flex:1;padding:20px 18px;max-width:640px;margin:0 auto;width:100%;}
    .card{background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:22px 20px;margin-bottom:16px;}
    .card-title{font-size:1rem;font-weight:700;color:var(--warm);margin-bottom:6px;}
    .card-sub{font-size:.85rem;color:var(--muted);margin-bottom:14px;line-height:1.5;}
    .btn{background:var(--green);color:#fff;border:none;padding:.65rem 1.6rem;
      border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
    .btn:hover{opacity:.88;}
    .btn:disabled{opacity:.5;cursor:default;}
    .btn-sec{background:transparent;color:var(--green);border:1.5px solid var(--green);
      padding:.55rem 1.2rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;}
    .btn-sec:hover{background:var(--gtint);}
    .btn-warm{background:var(--warm);color:#fff;border:none;padding:.6rem 1.4rem;
      border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;}
    .btn-warm:hover{opacity:.88;}
    select,input[type=text]{border:1px solid var(--border);border-radius:8px;
      padding:7px 12px;font-size:.9rem;background:var(--card);color:var(--brown);
      outline:none;transition:border-color .15s;width:100%;}
    select:focus,input[type=text]:focus{border-color:var(--green);}
    .note{background:var(--wtint);border-left:3px solid var(--warm);
      border-radius:0 8px 8px 0;padding:10px 14px;margin-top:10px;
      font-size:.85rem;line-height:1.6;}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
    label{font-size:.85rem;color:var(--muted);display:block;margin-bottom:4px;}


    .dice-face{width:160px;height:160px;background:var(--card);border:3px solid var(--border);
      border-radius:20px;display:flex;flex-direction:column;align-items:center;
      justify-content:center;margin:0 auto 16px;box-shadow:0 4px 16px rgba(107,140,66,.1);
      transition:border-color .2s,box-shadow .2s;cursor:default;user-select:none;}
    .dice-face.rolling{border-color:var(--green);box-shadow:0 0 0 4px rgba(107,140,66,.15);}
    .dice-q{font-size:1.9rem;font-weight:700;color:var(--green);text-align:center;}
    .dice-en{font-size:1rem;color:var(--muted);margin-top:4px;}
    .dice-num{font-size:.7rem;color:var(--border);margin-top:8px;}
    .prompt-box{background:var(--gtint);border:1px solid #c8ddb0;border-radius:10px;
      padding:14px 16px;margin-top:14px;font-size:.9rem;line-height:1.6;}

  </style>
</head>

</select></div><div class="dice-face" id="dice-face"><div class="dice-q" id="dice-q">?</div><div class="dice-en" id="dice-en"><span class="lang-en">Press Roll</span><span class="lang-zh">按下摇动</span></div><div class="dice-num" id="dice-num"></div></div><div style="text-align:center;margin-bottom:14px;"><button class="btn" onclick="rollDice()" style="font-size:1rem;padding:.75rem 2.5rem;"><span class="lang-en">🎲 Roll</span><span class="lang-zh">🎲 摇骰子</span></button></div><div class="prompt-box" id="prompt-box" style="display:none;"></div></div>
</main>
<script>

  document.body.classList.toggle('zh',l==='zh');
  document.getElementById('en-btn').classList.toggle('act',l==='en');
  document.getElementById('zh-btn').classList.toggle('act',l==='zh');
}

obby?", "你对这个爱好有什么看法？"]], "13": [["What would you like to order?", "你想点什么？"], ["What is the typical dish of Spain?", "西班牙的典型菜肴是什么？"], ["What is the difference between la carta and el menu?", "la carta 和 el menú 有什么区别？"]], "14": [["What size do you wear?", "你穿什么尺码？"], ["What does this clothing item cost?", "这件衣服多少錢？"], ["What direct object pronoun replaces el vestido?", "哪个直接宾语代词代替 el vestido？"]], "15": [["What is bigger — China or Spain?", "哪个更大——中国还是西班牙？"], ["What is the superlative of bueno?", "bueno 的最高级是什么？"], ["What comparison can you make?", "你能做哪些比较？"]], "15b": [["What are you obliged to do today?", "你今天必须做什么？"], ["What is the difference between tener que and hay que?", "tener que 和 hay que 有什么区别？"], ["What must everyone do to stay healthy?", "每个人必须做什么才能保持健康？"]], "16": [["What transport do you use to get to work?", "你用什么交通工具上班？"], ["What is at the end of this street?", "这条街的尽头是什么？"], ["What is the imperative of seguir?", "seguir 的命令形式是什么？"]], "17": [["What hurts?", "什么地方疼？"], ["What symptoms do you have?", "你有什么症状？"], ["What body part is this?", "这是哪个身体部位？"]], "18": [["What are you going to do this weekend?", "你这个周末要做什么？"], ["What plans do you have for next year?", "你明年有什么计划？"], ["What does voy a mean?", "voy a 是什么意思？"]], "19": [["What did you do yesterday?", "你昨天做了什么？"], ["What did you eat last night?", "你昨晚吃了什么？"], ["What is the preterite of hablar in yo?", "hablar 第一人称单数的过去时是什么？"]], "20": [["What did you do on your last trip?", "你上次旅行做了什么？"], ["What irregular verb means I went?", "哪个不规则动词表示我去了？"], ["What souvenirs did you buy?", "你买了什么纪念品？"]]}, "¿Dónde?": {"1": [["Where are you from?", "你来自哪里？"], ["Where do you live?", "你住在哪里？"], ["Where is your teacher from?", "你的老师来自哪里？"]], "2": [["Where is this country?", "这个国家在哪里？"], ["Where is the capital of Argentina?", "阿根廷的首都在哪里？"], ["Where do people speak Spanish?", "人们在哪里说西班牙语？"]], "3": [["Where does a doctor work?", "医生在哪里工作？"], ["Where does a teacher work?", "老师在哪里工作？"], ["Where does a firefighter work?", "消防员在 let rolling=false, curQ=null;
function rollDice(){
  if(rolling)return;
  rolling=true;
  const face=document.getElementById('dice-face');
  face.classList.add('rolling');
  document.getElementById('prompt-box').style.display='none';
  const target=Math.floor(Math.random()*QUESTIONS.length);
  let count=0,total=28+Math.floor(Math.random()*10);
  function tick(){
    const idx=Math.floor(Math.random()*QUESTIONS.length);
    const q=QUESTIONS[idx];
    document.getElementById('dice-q').textContent=q.q;
    document.getElementById('dice-en').innerHTML='<span class="lang-en">'+q.en+'</span><span class="lang-zh">'+q.zh+'</span>';
    count++;
    if(count<total){
      const d=count<total*.55?50:count<total*.8?110:260;
      setTimeout(tick,d);
    } else {
      curQ=QUESTIONS[target];
      document.getElementById('dice-q').textContent=curQ.q;
      document.getElementById('dice-en').innerHTML='<span class="lang-en">'+curQ.en+'</span><span class="lang-zh">'+curQ.zh+'</span>';
      document.getElementById('dice-num').textContent='';
      face.classList.remove('rolling');
      rolling=false;
      showPrompt();
    }
  }
  tick();
}
function showPrompt(){
  if(!curQ)return;
  const unit=document.getElementById('unit-sel').value;
  const wordPrompts=PROMPTS[curQ.q];
  const unitPrompts=wordPrompts?(wordPrompts[unit]||wordPrompts['1']):[['Form a question about this unit','就这个单元提问']];
  const p=unitPrompts[Math.floor(Math.random()*unitPrompts.length)];
  const pb=document.getElementById('prompt-box');
  pb.innerHTML='<strong><span class="lang-en">Form a question:</span><span class="lang-zh">提问：</span></strong><br>'+
    '<span style="font-size:.95rem;color:var(--brown);">'+
    '<span class="lang-en">'+p[0]+'</span>'+
    '<span class="lang-zh">'+p[1]+'</span>'+
    '</span>';
  pb.style.display='block';
}

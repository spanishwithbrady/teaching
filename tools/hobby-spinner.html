<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hobby Spinner · Spanish with Brady</title>

  <style>
    :root{--bg:#f7f5ef;--green:#6b8c42;--brown:#2e2416;--card:#ffffff;
      --border:#e2ddd4;--muted:#7a6e60;--warm:#8B5E3C;--radius:12px;
      --gtint:#eef4e4;--wtint:#f5ede0;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);
      color:var(--brown);display:flex;flex-direction:column;min-height:100vh;}
    a{color:inherit;text-decoration:none;}
    .lang-zh{display:none;}
    body.zh .lang-en{display:none;}
    body.zh .lang-zh{display:inline;}
    .lang-zh-block{display:none;}
    body.zh .lang-zh-block{display:block;}
    body.zh .lang-en-block{display:none;}
    .t-hdr{display:flex;align-items:center;justify-content:space-between;
      padding:10px 18px;border-bottom:1px solid var(--border);background:var(--card);}
    .t-logo{font-size:.9rem;font-weight:700;color:var(--brown);}
    .t-tog{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
    .t-tog button{padding:5px 13px;font-size:12px;font-weight:500;border:none;
      cursor:pointer;background:var(--bg);color:var(--muted);}
    .t-tog button.act{background:var(--green);color:#fff;}
    main{flex:1;padding:20px 18px;max-width:580px;margin:0 auto;width:100%;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      padding:22px 20px;margin-bottom:16px;}
    .card-title{font-size:1rem;font-weight:700;color:var(--warm);margin-bottom:6px;}
    .card-sub{font-size:.85rem;color:var(--muted);margin-bottom:16px;line-height:1.5;}
    .btn{background:var(--green);color:#fff;border:none;padding:.7rem 1.8rem;
      border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
    .btn:hover{opacity:.88;}
    .btn-sec{background:transparent;color:var(--green);border:1.5px solid var(--green);
      padding:.6rem 1.4rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;}
    .btn-sec:hover{background:var(--gtint);}
    .display{background:var(--bg);border-radius:10px;padding:16px;text-align:center;margin-bottom:14px;}
    .ans-box{background:var(--gtint);border:1px solid #c8ddb0;border-radius:8px;
      padding:12px 14px;margin-top:12px;display:none;font-size:.9rem;line-height:1.6;}
    .note{background:var(--wtint);border-left:3px solid var(--warm);
      border-radius:0 8px 8px 0;padding:10px 14px;margin-top:12px;
      font-size:.85rem;line-height:1.6;color:var(--brown);}
  </style>
  <style>
    .spinner-box{background:var(--bg);border:2px solid var(--border);border-radius:14px;
      padding:24px;text-align:center;min-height:120px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;margin-bottom:14px;transition:border-color .2s;}
    .spinner-box.spinning{border-color:var(--green);}
    .hobby-emoji{font-size:2.8rem;display:block;margin-bottom:6px;}
    .hobby-name{font-size:1.3rem;font-weight:700;color:var(--brown);}
    .opinion-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
    .opinion-chip{background:var(--gtint);border:1px solid #c8ddb0;border-radius:20px;
      padding:5px 13px;font-size:.82rem;color:var(--green);font-weight:500;cursor:pointer;
      transition:background .15s;}
    .opinion-chip:hover{background:#d4ebb0;}
    .opinion-chip.picked{background:var(--green);color:#fff;border-color:var(--green);}
    .sentence-box{background:var(--wtint);border:1px solid var(--border);border-radius:8px;
      padding:10px 14px;margin-top:12px;font-size:.9rem;min-height:36px;color:var(--brown);
      font-style:italic;}
    .cat-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
    .cat-pill{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;
      padding:5px 13px;font-size:.8rem;color:var(--muted);font-weight:500;cursor:pointer;transition:all .15s;}
    .cat-pill:hover{border-color:var(--green);color:var(--green);}
    .cat-pill.act{background:var(--green);border-color:var(--green);color:#fff;}
  </style>
</head>
<body>
  <header class="t-hdr">
    <a class="t-logo" href="../">Spanish with Brady</a>
    <div class="t-tog">
      <button id="en-btn" class="act" onclick="setLang('en')">EN</button>
      <button id="zh-btn" onclick="setLang('zh')">中文</button>
    </div>
  </header>
  <main>

    <div class="card">
      <div class="card-title">
        <span class="lang-en">🎯 Hobby Spinner</span>
        <span class="lang-zh">🎯 爱好转盘</span>
      </div>
      <p class="card-sub">
        <span class="lang-en">Spin for a hobby — what do you think of it?</span>
        <span class="lang-zh">转动转盘获得一个爱好——你对它有什么看法？</span>
      </p>
      <div class="cat-pills" id="cat-pills">
        <button class="cat-pill act" onclick="setCat('all',this)">
          <span class="lang-en">All</span><span class="lang-zh">全部</span>
        </button>
        <button class="cat-pill" onclick="setCat('creative',this)">🎨 <span class="lang-en">Creative</span><span class="lang-zh">创意</span></button>
        <button class="cat-pill" onclick="setCat('active',this)">⚽ <span class="lang-en">Active</span><span class="lang-zh">运动</span></button>
        <button class="cat-pill" onclick="setCat('intellectual',this)">📚 <span class="lang-en">Intellectual</span><span class="lang-zh">学习</span></button>
        <button class="cat-pill" onclick="setCat('social',this)">🎭 <span class="lang-en">Social</span><span class="lang-zh">社交</span></button>
        <button class="cat-pill" onclick="setCat('relaxing',this)">🌿 <span class="lang-en">Relaxing</span><span class="lang-zh">放松</span></button>
      </div>
      <div class="spinner-box" id="spinner-box">
        <span class="hobby-emoji" id="spin-emoji">🎲</span>
        <span class="hobby-name" id="spin-name">
          <span class="lang-en">Press Spin!</span><span class="lang-zh">按下旋转！</span>
        </span>
      </div>
      <div style="text-align:center;margin-bottom:14px;">
        <button class="btn" id="spin-btn" onclick="startSpin()">
          <span class="lang-en">Spin!</span><span class="lang-zh">旋转！</span>
        </button>
      </div>
      <div class="note" style="margin-bottom:12px;">
        <span class="lang-en"><strong>Click your reaction:</strong></span>
        <span class="lang-zh"><strong>点击你的感受：</strong></span>
        <div class="opinion-grid" id="opinion-grid"></div>
      </div>
      <div class="sentence-box" id="sentence-box">
        <span class="lang-en" style="color:var(--muted);">Your sentence will appear here.</span>
        <span class="lang-zh" style="color:var(--muted);">你的句子将显示在这里。</span>
      </div>
    </div>
  
  </main>

  <script>
    function setLang(l){
      document.body.classList.toggle('zh',l==='zh');
      document.getElementById('en-btn').classList.toggle('act',l==='en');
      document.getElementById('zh-btn').classList.toggle('act',l==='zh');
    }
  </script>
  <script>
    const HOBBIES = [
      {es:'bailar',emoji:'💃'},{es:'cantar',emoji:'🎤'},
      {es:'tocar la guitarra',emoji:'🎸'},{es:'escuchar música',emoji:'🎵'},
      {es:'leer',emoji:'📖'},{es:'ver series',emoji:'📺'},
      {es:'jugar videojuegos',emoji:'🎮'},{es:'hacer deporte',emoji:'⚽'},
      {es:'viajar',emoji:'✈️'},{es:'cocinar',emoji:'🍳'},
      {es:'hacer senderismo',emoji:'🥾'},{es:'la fotografía',emoji:'📷'},
      {es:'pintar',emoji:'🎨'},{es:'nadar',emoji:'🏊'},
      {es:'hacer yoga',emoji:'🧘'},{es:'montar en bici',emoji:'🚲'},
      {es:'la jardinería',emoji:'🌱'},{es:'meditar',emoji:'🧠'},
      {es:'aprender idiomas',emoji:'🗣️'},{es:'dibujar',emoji:'✏️'},
    ];
    const OPINIONS = [
      {es:'Me encanta',en:'I love it'},
      {es:'Me gusta mucho',en:'I like it a lot'},
      {es:'Me gusta bastante',en:'I quite like it'},
      {es:'Me da igual',en:'I don\'t mind'},
      {es:'No me gusta mucho',en:'I don\'t like it much'},
      {es:'No me gusta nada',en:'I don\'t like it at all'},
      {es:'Lo odio',en:'I hate it'},
    ];
    const HOBBY_CATS = {
      all: null,
      creative: ['bailar','cantar','tocar la guitarra','pintar','la fotografía','dibujar'],
      active: ['hacer deporte','nadar','hacer senderismo','montar en bici','hacer yoga'],
      intellectual: ['leer','aprender idiomas','meditar'],
      social: ['ver series','jugar videojuegos','viajar','cocinar'],
      relaxing: ['la jardinería','meditar','escuchar música'],
    };
    let curCat='all', activeHobbies=[...HOBBIES];
    let curHobby=null,spinning=false;

    function setCat(cat, btn){
      curCat=cat;
      document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('act'));
      btn.classList.add('act');
      activeHobbies = HOBBY_CATS[cat]
        ? HOBBIES.filter(h=>HOBBY_CATS[cat].includes(h.es))
        : [...HOBBIES];
      if(!activeHobbies.length) activeHobbies=[...HOBBIES];
    }

    // Build opinion chips
    const grid=document.getElementById('opinion-grid');
    OPINIONS.forEach(op=>{
      const btn=document.createElement('button');
      btn.className='opinion-chip';
      btn.innerHTML=`<span class="lang-en">${op.en}</span><span class="lang-zh">${op.es}</span>`;
      btn.onclick=()=>pickOpinion(op,btn);
      grid.appendChild(btn);
    });

    function pickOpinion(op,btn){
      document.querySelectorAll('.opinion-chip').forEach(c=>c.classList.remove('picked'));
      btn.classList.add('picked');
      const hobby=curHobby?curHobby.es:'[hobby]';
      document.getElementById('sentence-box').textContent=`${op.es} ${hobby}.`;
    }

    function startSpin(){
      if(spinning)return;
      spinning=true;
      document.getElementById('spin-btn').disabled=true;
      document.getElementById('spinner-box').classList.add('spinning');
      document.querySelectorAll('.opinion-chip').forEach(c=>c.classList.remove('picked'));
      document.getElementById('sentence-box').innerHTML=
        '<span class="lang-en" style="color:var(--muted);">Your sentence will appear here.</span><span class="lang-zh" style="color:var(--muted);">你的句子将显示在这里。</span>';
      const target=Math.floor(Math.random()*activeHobbies.length);
      let count=0,total=32+Math.floor(Math.random()*18);
      function tick(){
        const idx=Math.floor(Math.random()*activeHobbies.length);
        const h=activeHobbies[idx];
        document.getElementById('spin-emoji').textContent=h.emoji;
        document.getElementById('spin-name').textContent=h.es;
        count++;
        if(count<total){
          const d=count<total*.55?70:count<total*.8?140:320;
          setTimeout(tick,d);
        } else {
          curHobby=activeHobbies[target];
          document.getElementById('spin-emoji').textContent=curHobby.emoji;
          document.getElementById('spin-name').textContent=curHobby.es;
          document.getElementById('spinner-box').classList.remove('spinning');
          document.getElementById('spin-btn').disabled=false;
          spinning=false;
        }
      }
      tick();
    }
  </script>
</body>
</html>

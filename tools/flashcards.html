<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Flashcard Mode · Spanish with Brady</title>
  <style>

    :root{--bg:#f7f5ef;--green:#6b8c42;--brown:#2e2416;--card:#ffffff;
      --border:#e2ddd4;--muted:#7a6e60;--warm:#8B5E3C;--radius:12px;
      --gtint:#eef4e4;--wtint:#f5ede0;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,sans-serif;
      background:var(--bg);color:var(--brown);
      display:flex;flex-direction:column;min-height:100vh;}
    a{text-decoration:none;color:inherit;}
    .lang-zh{display:none;}
    body.zh .lang-en{display:none;}
    body.zh .lang-zh{display:inline;}
    .lang-zh-block{display:none;}
    body.zh .lang-zh-block{display:block;}
    body.zh .lang-en-block{display:none;}
    .t-hdr{display:flex;align-items:center;justify-content:space-between;
      padding:10px 18px;border-bottom:1px solid var(--border);
      background:var(--card);gap:12px;}
    .t-logo{font-size:.9rem;font-weight:700;color:var(--brown);}
    .t-back{font-size:.8rem;color:var(--warm);}
    .t-back:hover{text-decoration:underline;}
    .t-tog{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0;}
    .t-tog button{padding:5px 13px;font-size:12px;font-weight:500;border:none;
      cursor:pointer;background:var(--bg);color:var(--muted);}
    .t-tog button.act{background:var(--green);color:#fff;}
    main{flex:1;padding:20px 18px;max-width:640px;margin:0 auto;width:100%;}
    .card{background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:22px 20px;margin-bottom:16px;}
    .card-title{font-size:1rem;font-weight:700;color:var(--warm);margin-bottom:6px;}
    .card-sub{font-size:.85rem;color:var(--muted);margin-bottom:14px;line-height:1.5;}
    .btn{background:var(--green);color:#fff;border:none;padding:.65rem 1.6rem;
      border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
    .btn:hover{opacity:.88;}
    .btn:disabled{opacity:.5;cursor:default;}
    .btn-sec{background:transparent;color:var(--green);border:1.5px solid var(--green);
      padding:.55rem 1.2rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;}
    .btn-sec:hover{background:var(--gtint);}
    .btn-warm{background:var(--warm);color:#fff;border:none;padding:.6rem 1.4rem;
      border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;}
    .btn-warm:hover{opacity:.88;}
    select,input[type=text]{border:1px solid var(--border);border-radius:8px;
      padding:7px 12px;font-size:.9rem;background:var(--card);color:var(--brown);
      outline:none;transition:border-color .15s;width:100%;}
    select:focus,input[type=text]:focus{border-color:var(--green);}
    .note{background:var(--wtint);border-left:3px solid var(--warm);
      border-radius:0 8px 8px 0;padding:10px 14px;margin-top:10px;
      font-size:.85rem;line-height:1.6;}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
    label{font-size:.85rem;color:var(--muted);display:block;margin-bottom:4px;}


    .fc-setup{padding:4px 0;}
    .fc-setup .row{margin-top:12px;align-items:flex-end;}
    .fc-setup select{width:100%;margin-top:4px;}
    .fc-scene{display:none;}
    .progress-bar-wrap{background:var(--border);border-radius:10px;height:6px;margin-bottom:16px;overflow:hidden;}
    .progress-bar-fill{height:6px;background:var(--green);border-radius:10px;transition:width .3s;}
    .progress-lbl{font-size:.82rem;color:var(--muted);margin-bottom:8px;text-align:right;}
    .flip-card-outer{perspective:900px;width:100%;max-width:380px;height:220px;margin:0 auto 20px;cursor:pointer;}
    .flip-card-inner{width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;position:relative;}
    .flip-card-inner.flipped{transform:rotateY(180deg);}
    .flip-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;
      border-radius:var(--radius);border:2px solid var(--border);
      display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
    .flip-front{background:var(--bg);}
    .flip-back{background:var(--card);transform:rotateY(180deg);}
    .fc-lang-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .fc-word{font-size:1.6rem;font-weight:700;color:var(--brown);text-align:center;}
    .fc-emoji{font-size:2rem;margin-bottom:4px;}
    .fc-ans{font-size:1.1rem;font-weight:600;color:var(--green);text-align:center;}
    .fc-sub{font-size:.85rem;color:var(--muted);margin-top:6px;text-align:center;}
    .fc-hint{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:12px;}
    .score-display{font-size:1.4rem;font-weight:700;color:var(--green);text-align:center;margin:20px 0 8px;}

  </style>
</head>
<body>
<header class="t-hdr">
  <a class="t-back" href="index.html">← <span class="lang-en">Back to tools</span><span class="lang-zh">返回工具页</span></a>
  <a class="t-logo" href="../">Spanish with Brady</a>
  <div class="t-tog">
    <button id="en-btn" class="act" onclick="setLang('en')">EN</button>
    <button id="zh-btn" onclick="setLang('zh')">中文</button>
  </div>
</header>
<main>

<div class="card">
  <div class="card-title">🃏 <span class="lang-en">Flashcard Mode</span><span class="lang-zh">闪卡模式</span></div>

  <!-- Setup -->
  <div class="fc-setup" id="fc-setup">
    <div style="margin-bottom:10px;">
      <label><span class="lang-en">Unit:</span><span class="lang-zh">单元：</span></label>
      <select id="fc-unit"><option value="all">All units / 所有单元</option>
<option value="1">Unit 1 — Saludos</option>
<option value="2">Unit 2 — Origen</option>
<option value="3">Unit 3 — Profesiones</option>
<option value="4">Unit 4 — Ubicación</option>
<option value="5">Unit 5 — Objetos</option>
<option value="6">Unit 6 — Familia</option>
<option value="7">Unit 7 — Descripción</option>
<option value="8">Unit 8 — Estados</option>
<option value="9">Unit 9 — La Semana</option>
<option value="10">Unit 10 — Rutina</option>
<option value="11">Unit 11 — Calendario</option>
<option value="12">Unit 12 — Aficiones</option>
<option value="13">Unit 13 — Restaurante</option>
<option value="14">Unit 14 — De Compras</option>
<option value="15">Unit 15 — Comparaciones</option>
<option value="15b">Unit 15b — Obligación</option>
<option value="16">Unit 16 — Ciudad</option>
<option value="17">Unit 17 — Salud</option>
<option value="18">Unit 18 — Futuro</option>
<option value="19">Unit 19 — Pasado I</option>
<option value="20">Unit 20 — Pasado II</option></select>
    </div>
    <div style="margin-bottom:10px;">
      <label><span class="lang-en">Direction:</span><span class="lang-zh">方向：</span></label>
      <select id="fc-dir">
        <option value="es-en">Spanish → English + 中文</option>
        <option value="en-es">English → Spanish</option>
        <option value="zh-es">中文 → Spanish</option>
      </select>
    </div>
    <div style="margin-bottom:14px;">
      <label><span class="lang-en">Cards:</span><span class="lang-zh">卡片数量：</span></label>
      <select id="fc-count">
        <option value="10">10 cards</option>
        <option value="20">20 cards</option>
        <option value="30">30 cards</option>
        <option value="50">50 cards</option>
        <option value="all">All cards</option>
      </select>
    </div>
    <button class="btn" onclick="startFC()">
      <span class="lang-en">Start</span><span class="lang-zh">开始</span>
    </button>
  </div>

  <!-- Card scene -->
  <div class="fc-scene" id="fc-scene">
    <div class="progress-lbl" id="fc-progress"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="fc-bar" style="width:0%"></div></div>

    <div class="flip-card-outer" onclick="flipCard()">
      <div class="flip-card-inner" id="fc-inner">
        <div class="flip-face flip-front">
          <div class="fc-lang-label" id="fc-front-label"></div>
          <div class="fc-emoji" id="fc-emoji"></div>
          <div class="fc-word" id="fc-front-word"></div>
        </div>
        <div class="flip-face flip-back">
          <div class="fc-lang-label" id="fc-back-label"></div>
          <div class="fc-ans" id="fc-back-word"></div>
          <div class="fc-sub" id="fc-back-sub"></div>
        </div>
      </div>
    </div>
    <p class="fc-hint">
      <span class="lang-en">Click card to flip</span>
      <span class="lang-zh">点击卡片翻转</span>
    </p>

    <div id="fc-flip-btns" style="display:none;">
      <div class="row" style="justify-content:center;">
        <button class="btn" onclick="markCard(true)">✓ <span class="lang-en">Got it</span><span class="lang-zh">记住了</span></button>
        <button class="btn-warm" onclick="markCard(false)">✗ <span class="lang-en">Again</span><span class="lang-zh">再来</span></button>
      </div>
    </div>

    <div class="score-display" id="fc-score" style="display:none;"></div>
    <div id="fc-end-btns" style="display:none;">
      <div class="row" style="justify-content:center;">
        <button class="btn" onclick="startFC()"><span class="lang-en">Play again</span><span class="lang-zh">再玩一次</span></button>
        <button class="btn-sec" onclick="resetFC()"><span class="lang-en">Setup</span><span class="lang-zh">重新设置</span></button>
      </div>
    </div>
  </div>
</div>

</main>

  document.body.classList.toggle('zh',l==='zh');
  document.getElementById('en-btn').classList.toggle('act',l==='en');

}

let fcDeck=[], fcIdx=0, fcCorrect=0, fcDir='es-en', fcFlipped=false;

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function startFC(){
  const unit=document.getElementById('fc-unit').value;
  fcDir=document.getElementById('fc-dir').value;
  const cnt=document.getElementById('fc-count').value;
  let pool=unit==='all'?[...VOCAB]:VOCAB.filter(c=>c.unit===unit);
  shuffle(pool);
  if(cnt!=='all') pool=pool.slice(0,parseInt(cnt));
  fcDeck=pool; fcIdx=0; fcCorrect=0; fcFlipped=false;
  document.getElementById('fc-setup').style.display='none';
  document.getElementById('fc-scene').style.display='block';
  document.getElementById('fc-score').style.display='none';
  document.getElementById('fc-end-btns').style.display='none';
  showCard();
}

function showCard(){
  if(fcIdx>=fcDeck.length){endFC();return;}
  const c=fcDeck[fcIdx];
  const total=fcDeck.length;
  fcFlipped=false;
  document.getElementById('fc-inner').classList.remove('flipped');
  document.getElementById('fc-flip-btns').style.display='none';
  document.getElementById('fc-progress').textContent='Card '+(fcIdx+1)+' of '+total;
  document.getElementById('fc-bar').style.width=(fcIdx/total*100)+'%';
  document.getElementById('fc-emoji').textContent=c.emoji||'';
  if(fcDir==='es-en'){
    document.getElementById('fc-front-label').textContent='ES';
    document.getElementById('fc-front-word').textContent=c.spanish;
    document.getElementById('fc-back-label').textContent='EN / 中文';
    document.getElementById('fc-back-word').textContent=c.english;
    document.getElementById('fc-back-sub').textContent=c.chinese;
  } else if(fcDir==='en-es'){
    document.getElementById('fc-front-label').textContent='EN';
    document.getElementById('fc-front-word').textContent=c.english;
    document.getElementById('fc-back-label').textContent='ES';
    document.getElementById('fc-back-word').textContent=c.spanish;
    document.getElementById('fc-back-sub').textContent=c.chinese;
  } else {
    document.getElementById('fc-front-label').textContent='中文';
    document.getElementById('fc-front-word').textContent=c.chinese;
    document.getElementById('fc-back-label').textContent='ES';
    document.getElementById('fc-back-word').textContent=c.spanish;
    document.getElementById('fc-back-sub').textContent=c.english;
  }
}

function flipCard(){
  if(fcFlipped)return;
  fcFlipped=true;
  document.getElementById('fc-inner').classList.add('flipped');
  setTimeout(()=>{document.getElementById('fc-flip-btns').style.display='block';},300);
}

function markCard(correct){
  if(correct){fcCorrect++; fcIdx++;}
  else{const c=fcDeck.splice(fcIdx,1)[0]; fcDeck.push(c);}
  document.getElementById('fc-flip-btns').style.display='none';
  showCard();
}

function endFC(){
  const total=fcDeck.length+fcCorrect;
  document.getElementById('fc-inner').style.display='none';
  document.querySelector('.fc-hint').style.display='none';
  document.getElementById('fc-score').style.display='block';
  document.getElementById('fc-score').innerHTML=
    fcCorrect+' / '+total+' <span style="font-size:.9rem;color:var(--muted);">cards correct</span>';
  document.getElementById('fc-end-btns').style.display='block';
  document.getElementById('fc-progress').textContent='Done!';
  document.getElementById('fc-bar').style.width='100%';
}

function resetFC(){
  document.getElementById('fc-setup').style.display='block';
  document.getElementById('fc-scene').style.display='none';
  document.getElementById('fc-inner').style.display='block';
  document.querySelector('.fc-hint').style.display='block';
}

</script>
